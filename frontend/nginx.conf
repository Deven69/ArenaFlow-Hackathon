server {
    listen 8080;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://maps.googleapis.com https://translation.googleapis.com https://language.googleapis.com https://logging.googleapis.com https://monitoring.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com";
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()";

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
